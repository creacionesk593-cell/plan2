<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Suite Transaccional TuBingo Pro</title>
    <script type="module">
        import { supabase } from './js/supabase-client.js';
        async function enrutar() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
            } else {
                const rol = localStorage.getItem('user_role');
                if (rol === 'admin') window.location.href = 'admin.html';
                else if (rol === 'vendedor') window.location.href = 'vendedor.html';
                else window.location.href = 'cliente.html';
            }
        }
        window.onload = enrutar;
    </script>
</head>
<body style="background: #0d0d0d; color: #fff; font-family: sans-serif; text-align: center; padding-top: 20%;">
    <p>Validando credenciales criptográficas de sesión...</p>
</body>
</html>
